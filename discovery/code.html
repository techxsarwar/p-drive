<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>P-Drive Onboarding - Discovery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

        tailwind.config = {
          darkMode: "class",
          theme: {

              "colors": {
                      "on-tertiary-fixed-variant": "#005321",

                      "secondary-fixed-dim": "#c6c7c5",
                      "surface-variant": "#dce2f7",

                      "error": "#ba1a1a",
                      "on-primary": "#ffffff",
                      "secondary": "#5d5f5d",
                      "primary": "#3748dd",
                      "surface-bright": "#f9f9ff",
                      "on-secondary-fixed": "#1a1c1b",
                      "surface-container-high": "#e1e8fd",
                      "tertiary-container": "#00873b",
                      "on-primary-fixed-variant": "#192dc8",
                      "tertiary-fixed-dim": "#4ae176",
                      "error-container": "#ffdad6",
                      "surface-container-highest": "#dce2f7",
                      "secondary-fixed": "#e2e3e1",
                      "on-error": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-container": "#636563",
                      "surface-tint": "#3a4bdf",
                      "tertiary": "#006b2d",
                      "on-surface-variant": "#454655",
                      "outline": "#757687",
                      "on-tertiary-container": "#f7fff3",
                      "on-surface": "#141b2b",
                      "on-primary-container": "#fffbff",
                      "surface-container": "#e9edff",
                      "on-secondary": "#ffffff",
                      "on-secondary-fixed-variant": "#454746",
                      "inverse-on-surface": "#edf0ff",
                      "primary-container": "#5364f7",
                      "on-tertiary": "#ffffff",
                      "on-error-container": "#93000a",
                      "surface-dim": "#d3daef",
                      "inverse-surface": "#293040",
                      "primary-fixed-dim": "#bdc2ff",
                      "secondary-container": "#e2e3e1",
                      "surface": "#f9f9ff",
                      "background": "#f9f9ff",
                      "on-tertiary-fixed": "#002109",
                      "inverse-primary": "#bdc2ff",
                      "outline-variant": "#c5c5d8",

                      "tertiary-fixed": "#6bff8f"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px",
                      "2xl": "1rem"
              },
              "spacing": {
                      "section-gap": "40px",
                      "base": "8px",
                      "container-padding": "24px",
                      "stack-gap": "16px",
                      "gutter": "16px"
              },
              "fontFamily": {
                      "headline-md": ["Inter"],
                      "display": ["Inter"],
                      "label-md": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-lg": ["Inter"],
                      "label-sm": ["Inter"]
              },
              "fontSize": {
                      "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],

                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.03em", "fontWeight": "600"}]
              }
            }
          }
        }

<style>
        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.4) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        /* Soft shadows as per style guide */
        .shadow-level-1 {
            box-shadow: 0 4px 20px 0 rgba(17, 24, 39, 0.06);
        }
        .shadow-level-1-hover {
            box-shadow: 0 10px 30px 0 rgba(17, 24, 39, 0.1);
        }

        /* Selection styling */
        .option-card.selected {
            border-color: #3748dd; /* primary */
            background-color: #f1f3ff; /* surface-container-low */
        }
        .option-card.selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-sans antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Progress Indicator (Slim 4px track as per guidelines) -->
<div class="w-full h-1 bg-surface-variant/50 sticky top-0 z-50">
<div class="h-full bg-primary rounded-r-full w-2/5 transition-all duration-500 ease-out"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[600px] mx-auto px-container-padding flex flex-col pt-12 pb-[120px] relative">
<!-- Header -->
<header class="mb-section-gap animate-[fadeIn_0.5s_ease-out]">
<h1 class="font-display text-display text-on-background tracking-tight">
                How did you hear about P-Drive?
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-4">
                We're curious to know what brought you to our tranquil workspace.
            </p>
</header>
<!-- Bento Grid Options -->
<div class="grid grid-cols-2 gap-4 w-full" id="options-container">
<!-- Option: Google -->
<button class="option-card group relative bg-surface-container-lowest rounded-2xl p-6 flex flex-col items-start justify-center gap-4 shadow-level-1 hover:shadow-level-1-hover border-2 border-transparent transition-all duration-200 text-left overflow-hidden active:scale-[0.98]" data-value="google">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined text-[24px]">search</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">Search</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Google, Bing, etc.</p>
</div>
<!-- Selection Checkmark -->
<div class="check-icon absolute top-4 right-4 text-primary opacity-0 scale-50 transition-all duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option: Friend -->
<button class="option-card group relative bg-surface-container-lowest rounded-2xl p-6 flex flex-col items-start justify-center gap-4 shadow-level-1 hover:shadow-level-1-hover border-2 border-transparent transition-all duration-200 text-left overflow-hidden active:scale-[0.98]" data-value="friend">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined text-[24px]">group</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">Friend</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Word of mouth</p>
</div>
<div class="check-icon absolute top-4 right-4 text-primary opacity-0 scale-50 transition-all duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option: YouTube -->
<button class="option-card group relative bg-surface-container-lowest rounded-2xl p-6 flex flex-col items-start justify-center gap-4 shadow-level-1 hover:shadow-level-1-hover border-2 border-transparent transition-all duration-200 text-left overflow-hidden active:scale-[0.98]" data-value="youtube">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined text-[24px]">play_circle</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">YouTube</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Video review or ad</p>
</div>
<div class="check-icon absolute top-4 right-4 text-primary opacity-0 scale-50 transition-all duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option: Instagram -->
<button class="option-card group relative bg-surface-container-lowest rounded-2xl p-6 flex flex-col items-start justify-center gap-4 shadow-level-1 hover:shadow-level-1-hover border-2 border-transparent transition-all duration-200 text-left overflow-hidden active:scale-[0.98]" data-value="instagram">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined text-[24px]">photo_camera</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">Instagram</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Social media post</p>
</div>
<div class="check-icon absolute top-4 right-4 text-primary opacity-0 scale-50 transition-all duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option: Other (Spans full width) -->
<button class="option-card group relative bg-surface-container-lowest rounded-2xl p-6 flex flex-row items-center justify-start gap-6 shadow-level-1 hover:shadow-level-1-hover border-2 border-transparent transition-all duration-200 text-left overflow-hidden active:scale-[0.98] col-span-2" data-value="other">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300 shrink-0">
<span class="material-symbols-outlined text-[24px]">more_horiz</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-on-surface">Other</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Somewhere else entirely</p>
</div>
<div class="check-icon relative text-primary opacity-0 scale-50 transition-all duration-300 ml-auto">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
</main>
<!-- Bottom Action Area (Sticky) -->
<div class="fixed bottom-0 left-0 w-full px-container-padding pb-8 pt-12 bg-gradient-to-t from-background via-background/90 to-transparent z-40 pointer-events-none">
<div class="max-w-[600px] mx-auto pointer-events-auto">
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-[16px] rounded-xl shadow-lg transition-all duration-300 opacity-50 translate-y-2 pointer-events-none active:scale-[0.98] hover:bg-surface-tint flex items-center justify-center gap-2" id="continue-btn">
                Continue
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.option-card');
            const continueBtn = document.getElementById('continue-btn');

            cards.forEach(card => {
                card.addEventListener('click', () => {
                    // Remove selected class from all
                    cards.forEach(c => c.classList.remove('selected'));
                    
                    // Add to clicked
                    card.classList.add('selected');

                    // Enable continue button
                    continueBtn.classList.remove('opacity-50', 'translate-y-2', 'pointer-events-none');
                    
                    // Add a tiny haptic feel via transform
                    card.style.transform = 'scale(0.97)';
                    setTimeout(() => {
                        card.style.transform = '';
                    }, 150);
                });
            });
        });
    </script>
</body></html>
