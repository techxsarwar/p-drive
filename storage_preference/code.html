<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>P-Drive - Onboarding</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed-variant": "#005321",
                        "on-primary-fixed": "#000965",
                        "secondary-fixed-dim": "#c6c7c5",
                        "surface-variant": "#dce2f7",
                        "on-background": "#141b2b",
                        "primary-fixed": "#dfe0ff",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "secondary": "#5d5f5d",
                        "primary": "#3748dd",
                        "surface-bright": "#f9f9ff",
                        "on-secondary-fixed": "#1a1c1b",
                        "surface-container-high": "#e1e8fd",
                        "tertiary-container": "#00873b",
                        "on-primary-fixed-variant": "#192dc8",
                        "tertiary-fixed-dim": "#4ae176",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#dce2f7",
                        "secondary-fixed": "#e2e3e1",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#636563",
                        "surface-tint": "#3a4bdf",
                        "tertiary": "#006b2d",
                        "on-surface-variant": "#454655",
                        "outline": "#757687",
                        "on-tertiary-container": "#f7fff3",
                        "on-surface": "#141b2b",
                        "on-primary-container": "#fffbff",
                        "surface-container": "#e9edff",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#454746",
                        "inverse-on-surface": "#edf0ff",
                        "primary-container": "#5364f7",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-dim": "#d3daef",
                        "inverse-surface": "#293040",
                        "primary-fixed-dim": "#bdc2ff",
                        "secondary-container": "#e2e3e1",
                        "surface": "#f9f9ff",
                        "background": "#f9f9ff",
                        "on-tertiary-fixed": "#002109",
                        "inverse-primary": "#bdc2ff",
                        "outline-variant": "#c5c5d8",
                        "surface-container-low": "#f1f3ff",
                        "tertiary-fixed": "#6bff8f"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1.5rem"
                    },
                    spacing: {
                        "section-gap": "40px",
                        "base": "8px",
                        "container-padding": "24px",
                        "stack-gap": "16px",
                        "gutter": "16px"
                    },
                    fontFamily: {
                        "headline-md": ["Inter"],
                        "display": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    fontSize: {
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.03em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Area (Onboarding Context) -->
<header class="px-container-padding py-6 flex flex-col gap-6">
<!-- Back Action -->
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors -ml-2 text-on-surface active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Progress Bar -->
<div aria-valuemax="100" aria-valuemin="0" aria-valuenow="33" class="w-full h-1 bg-secondary-container rounded-full overflow-hidden" role="progressbar">
<div class="w-1/3 h-full bg-primary rounded-full transition-all duration-500 ease-out"></div>
</div>
</header>
<!-- Header Content -->
<section class="px-container-padding pt-4 pb-8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-3 md:font-headline-lg md:text-headline-lg">What do you want to store?</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-md">Select all the file types you plan to keep in P-Drive. We'll set up your initial folders based on these choices.</p>
</section>
<!-- Selection Grid -->
<main class="px-container-padding flex-1 pb-32">
<div class="grid grid-cols-2 md:grid-cols-4 gap-gutter auto-rows-fr">
<!-- Card: Documents -->
<label class="relative cursor-pointer group select-none block h-full">
<input checked="" class="peer sr-only" type="checkbox" value="documents"/>
<div class="h-full min-h-[140px] rounded-[24px] bg-surface shadow-[0_4px_20px_rgba(17,24,39,0.05)] border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-tint/5 transition-all duration-300 flex flex-col justify-between p-5 hover:shadow-[0_8px_30px_rgba(17,24,39,0.08)] active:scale-[0.98]">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors duration-300">
<span class="material-symbols-outlined text-[14px] text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity duration-300">check</span>
</div>
</div>
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary transition-colors">Documents</span>
</div>
</label>
<!-- Card: Photos -->
<label class="relative cursor-pointer group select-none block h-full">
<input class="peer sr-only" type="checkbox" value="photos"/>
<div class="h-full min-h-[140px] rounded-[24px] bg-surface shadow-[0_4px_20px_rgba(17,24,39,0.05)] border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-tint/5 transition-all duration-300 flex flex-col justify-between p-5 hover:shadow-[0_8px_30px_rgba(17,24,39,0.08)] active:scale-[0.98]">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors duration-300">
<span class="material-symbols-outlined text-[14px] text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity duration-300">check</span>
</div>
</div>
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary transition-colors">Photos</span>
</div>
</label>
<!-- Card: Videos (Spans 2 columns to create bento effect) -->
<label class="relative cursor-pointer group select-none block h-full col-span-2 md:col-span-2">
<input class="peer sr-only" type="checkbox" value="videos"/>
<div class="h-full min-h-[140px] rounded-[24px] bg-surface shadow-[0_4px_20px_rgba(17,24,39,0.05)] border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-tint/5 transition-all duration-300 flex flex-col justify-between p-5 hover:shadow-[0_8px_30px_rgba(17,24,39,0.08)] active:scale-[0.98]">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">movie</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors duration-300">
<span class="material-symbols-outlined text-[14px] text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity duration-300">check</span>
</div>
</div>
<div>
<span class="block font-label-md text-label-md text-on-surface group-hover:text-primary transition-colors">Videos</span>
<span class="block font-label-sm text-label-sm text-on-surface-variant mt-1 font-normal">Large file optimization</span>
</div>
</div>
</label>
<!-- Card: Music -->
<label class="relative cursor-pointer group select-none block h-full">
<input class="peer sr-only" type="checkbox" value="music"/>
<div class="h-full min-h-[140px] rounded-[24px] bg-surface shadow-[0_4px_20px_rgba(17,24,39,0.05)] border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-tint/5 transition-all duration-300 flex flex-col justify-between p-5 hover:shadow-[0_8px_30px_rgba(17,24,39,0.08)] active:scale-[0.98]">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">music_note</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors duration-300">
<span class="material-symbols-outlined text-[14px] text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity duration-300">check</span>
</div>
</div>
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary transition-colors">Music</span>
</div>
</label>
<!-- Card: Work Files -->
<label class="relative cursor-pointer group select-none block h-full">
<input checked="" class="peer sr-only" type="checkbox" value="work"/>
<div class="h-full min-h-[140px] rounded-[24px] bg-surface shadow-[0_4px_20px_rgba(17,24,39,0.05)] border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-tint/5 transition-all duration-300 flex flex-col justify-between p-5 hover:shadow-[0_8px_30px_rgba(17,24,39,0.08)] active:scale-[0.98]">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">work</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors duration-300">
<span class="material-symbols-outlined text-[14px] text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity duration-300">check</span>
</div>
</div>
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary transition-colors">Work Files</span>
</div>
</label>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 w-full px-container-padding py-6 bg-gradient-to-t from-background via-background/90 to-transparent pb-safe">
<button class="w-full max-w-md mx-auto block bg-primary text-on-primary font-label-md text-label-md py-4 rounded-[16px] shadow-[0_8px_20px_rgba(55,72,221,0.25)] hover:bg-surface-tint hover:shadow-[0_12px_24px_rgba(55,72,221,0.3)] transition-all duration-300 active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-primary/20">
            Continue
        </button>
</footer>
</body></html>
