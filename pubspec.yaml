name: pdrive
description: "A warm minimalist cloud storage application UI in Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  flutter_animate: ^4.5.0
  flutter_lucide: ^1.11.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  file_picker: ^8.0.3
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
