name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Back up local files
        run: |
          mv lib/main.dart lib/main.dart.bak
          mv pubspec.yaml pubspec.yaml.bak

      - name: Create Android Platform wrapper & Set Package Name
        run: flutter create --platforms=android --org com.parallelogramfoundation --project-name pdrive --overwrite .

      - name: Restore backed up files
        run: |
          rm lib/main.dart
          mv lib/main.dart.bak lib/main.dart
          rm pubspec.yaml
          mv pubspec.yaml.bak pubspec.yaml

      - name: Configure Android Internet Permission
        run: |
          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          # Inject internet permission right before the application tag
          if 'android.permission.INTERNET' not in content:
              content = content.replace('<application', '<uses-permission android:name=\"android.permission.INTERNET\"/>\n    <application')
          with open(path, 'w') as f:
              f.write(content)
          "

      - name: Configure Android SDK versions to 36
        run: |
          python3 -c "
          import os
          
          # 1. Force SDK versions on the main app
          app_path = 'android/app/build.gradle.kts' if os.path.exists('android/app/build.gradle.kts') else 'android/app/build.gradle'
          print(f'Modifying {app_path}')
          with open(app_path, 'r') as f:
              content = f.read()
          content = content.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 36')
          content = content.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 36')
          content = content.replace('targetSdk = flutter.targetSdkVersion', 'targetSdk = 36')
          content = content.replace('targetSdkVersion flutter.targetSdkVersion', 'targetSdkVersion 36')
          with open(app_path, 'w') as f:
              f.write(content)
          print('Successfully forced compileSdk and targetSdk to 36 on app')

          # 2. Force SDK versions on all subprojects/plugins (to resolve file_picker aar metadata issue)
          root_path = 'android/build.gradle.kts' if os.path.exists('android/build.gradle.kts') else 'android/build.gradle'
          print(f'Modifying {root_path}')
          if root_path.endswith('.kts'):
              with open(root_path, 'a') as f:
                  f.write('\nsubprojects {\n    afterEvaluate {\n        val android = extensions.findByName(\"android\")\n        if (android != null) {\n            android.javaClass.methods.firstOrNull {\n                (it.name == \"compileSdkVersion\" || it.name == \"setCompileSdk\" || it.name == \"compileSdk\") &&\n                it.parameterTypes.size == 1 &&\n                (it.parameterTypes[0] == Int::class.javaPrimitiveType || it.parameterTypes[0] == Int::class.javaObjectType)\n            }?.invoke(android, 36)\n            \n            val defaultConfig = android.javaClass.methods.firstOrNull {\n                it.name == \"getDefaultConfig\" &&\n                it.parameterTypes.isEmpty()\n            }?.invoke(android)\n            \n            if (defaultConfig != null) {\n                defaultConfig.javaClass.methods.firstOrNull {\n                    (it.name == \"setTargetSdkVersion\" || it.name == \"setTargetSdk\" || it.name == \"targetSdk\") &&\n                    it.parameterTypes.size == 1 &&\n                    (it.parameterTypes[0] == Int::class.javaPrimitiveType || it.parameterTypes[0] == Int::class.javaObjectType)\n                }?.invoke(defaultConfig, 36)\n            }\n        }\n    }\n}\n')
          else:
              with open(root_path, 'a') as f:
                  f.write('\nsubprojects {\n    afterEvaluate { project ->\n        if (project.hasProperty(\'android\')) {\n            project.android {\n                compileSdkVersion 36\n                defaultConfig {\n                    targetSdk 36\n                }\n            }\n        }\n    }\n}\n')
          print('Successfully configured subprojects SDK version overrides')
          "

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Debug and Release)
        run: |
          flutter build apk --debug
          flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: p-drive-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: p-drive-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
