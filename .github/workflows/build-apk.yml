name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Back up local files
        run: |
          mv lib/main.dart lib/main.dart.bak
          mv pubspec.yaml pubspec.yaml.bak

      - name: Create Android Platform wrapper & Set Package Name
        run: flutter create --platforms=android --org com.parallelogramfoundation --project-name pdrive --overwrite .

      - name: Restore backed up files
        run: |
          rm lib/main.dart
          mv lib/main.dart.bak lib/main.dart
          rm pubspec.yaml
          mv pubspec.yaml.bak pubspec.yaml

      - name: Configure Android Internet Permission
        run: |
          python3 -c "
          import os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f:
              content = f.read()
          # Inject internet permission right after the opening manifest tag
          if 'android.permission.INTERNET' not in content:
              content = content.replace('<manifest ', '<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">\n    <uses-permission android:name=\"android.permission.INTERNET\"/>\n')
          with open(path, 'w') as f:
              f.write(content)
          "

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Debug and Release)
        run: |
          flutter build apk --debug
          flutter build apk --release

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: p-drive-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: p-drive-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
