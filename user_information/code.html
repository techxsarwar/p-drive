    body {

<body class="bg-background min-h-screen flex flex-col font-sans antialiased text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Onboarding Canvas -->
<main class="flex-1 flex flex-col w-full max-w-lg mx-auto px-container-padding relative">
<!-- Progress Indicator -->
<header class="w-full pt-12 pb-8 flex items-center gap-2">
<div aria-label="Step 1 completed" class="h-1 flex-1 bg-primary rounded-full"></div>
<div aria-label="Step 2 pending" class="h-1 flex-1 bg-secondary-container rounded-full"></div>
<div aria-label="Step 3 pending" class="h-1 flex-1 bg-secondary-container rounded-full"></div>
</header>
<!-- Content Area -->
<div class="flex-1 flex flex-col items-center justify-center mt-section-gap w-full">
<!-- Friendly Illustration -->
<div class="w-full max-w-[280px] aspect-square mb-8 relative bg-surface-container-low flex items-center justify-center overflow-hidden" style="border-radius: 24px;">
<img class="object-cover w-full h-full opacity-90 mix-blend-multiply" data-alt="A warm, minimalist 3D illustration of a friendly abstract geometric character composed of soft, rounded shapes in muted off-white and calm blue tones. The character appears welcoming and approachable, set against a pristine, well-lit studio background that perfectly matches a bright, modern light-mode UI aesthetic. The lighting is soft and diffused, creating a premium, tactile feel that evokes feelings of calm and clarity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0gE0537VNeCJUeWTUJw6SoEHK0aJxm6FXujeEELui3dYU0hSBlw5Mrfqp1HuOJmY8Shp5AsciN4ZL9Ua8EbHqhWcvtITRrLwLHXyPTu1ktWB00E2_0yhqiwqMXtfhu1yc-zWjHevnQ2rX5hJSSezlR0QObkTKTfr11q1YNbVf7mSBT4igKZd-5ZU4dxrTEKU6FhLcsXLECUsfemJ1XNp1f1vdXuiUYu5lJ2aaepfbxRmFjn_3bFiqwe3tlulSr1dsKL9lek5_6WEm"/>
</div>
<!-- Headers -->
<div class="text-center w-full mb-8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">
                    Let's get started
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    What should we call you in your workspace?
                </p>
</div>
<!-- Single Input Form -->
<form class="w-full flex flex-col items-center" id="onboardingForm">
<div class="relative w-full group">
<!-- Custom 24px rounding applied via inline style to meet specific prompt requirement, overriding config limits -->
<input autocomplete="name" class="w-full bg-surface-container-low border-2 border-transparent focus:border-primary focus:bg-surface outline-none px-6 py-5 font-body-md text-body-md text-on-surface placeholder:text-outline transition-all duration-300 shadow-sm" id="userName" placeholder="Your full name" required="" style="border-radius: 24px;" type="text"/>
<!-- Subtle focus ring effect -->
<div class="absolute inset-0 border border-black/5 pointer-events-none transition-opacity duration-300 group-focus-within:opacity-0" style="border-radius: 24px;"></div>
</div>
<!-- Bottom Action Docked -->
<div class="fixed bottom-0 left-0 w-full px-container-padding pb-8 pt-4 bg-gradient-to-t from-background via-background to-transparent md:relative md:bg-none md:pb-0 md:pt-12">
<button class="w-full max-w-lg mx-auto bg-primary text-on-primary font-label-md text-label-md py-4 px-8 hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-md flex items-center justify-center gap-2" style="border-radius: 24px;" type="submit">
<span>Continue</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
<script>
        // Lightweight micro-interaction for the form
        document.getElementById('onboardingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            // Loading state
            btn.innerHTML = '<span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span>';
            btn.classList.add('opacity-80');
            
            // Simulate network request
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('opacity-80');
                // Proceed to next step logic would go here
            }, 800);
        });
    </script>
</body></html>
